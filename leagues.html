<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Kopala FPL — Leagues & Standings</title>
<meta name="description" content="FPL League standings, manager comparisons, and squad analysis.">
<meta name="theme-color" content="#0a0e1a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f0f2f8" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kopala FPL">
<link rel="apple-touch-icon" href="/android-chrome-192x192.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="manifest" href="manifest.json">

<script>(function(){
  var t=localStorage.getItem('kopala_theme');
  if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
})();</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="nav.css">
<link rel="stylesheet" href="footer.css">

<style>
[data-theme="light"]{
  --c-bg:#f0f2f8;--c-surface:#fff;--c-s2:#f5f6fa;--c-s3:#eaecf4;--c-s4:#dfe2f0;
  --c-border:rgba(0,0,0,.053);--c-border2:rgba(0,0,0,.096);--c-border3:rgba(0,0,0,.18);
  --c-t1:#080b1e;--c-t2:#424a78;--c-t3:#8e95bc;
  --c-green:#009950;--c-red:#d42038;--c-amber:#d67800;--c-blue:#1e5edc;--c-gold:#c08800;
  --c-green-d:rgba(0,153,80,.07);--c-green-m:rgba(0,153,80,.15);
  --c-red-d:rgba(212,32,56,.07);--c-red-m:rgba(212,32,56,.15);
  --c-amber-d:rgba(214,120,0,.08);--c-amber-m:rgba(214,120,0,.15);
  --c-blue-d:rgba(30,94,220,.08);--c-blue-m:rgba(30,94,220,.15);
  --c-glow:rgba(0,153,80,.15);--c-pill:#fff;
  --nav:rgba(239,242,251,.9);--sh:0 2px 12px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --c-bg:#0a0e1a;--c-surface:#111520;--c-s2:#181d2e;--c-s3:#1f2538;--c-s4:#252d3f;
  --c-border:rgba(255,255,255,.06);--c-border2:rgba(255,255,255,.11);--c-border3:rgba(255,255,255,.16);
  --c-t1:#eef0ff;--c-t2:#8890b8;--c-t3:#454d72;
  --c-green:#00e87a;--c-red:#ff3d5a;--c-amber:#ffb020;--c-blue:#5090ff;--c-gold:#ffd54f;
  --c-green-d:rgba(0,232,122,.07);--c-green-m:rgba(0,232,122,.17);
  --c-red-d:rgba(255,61,90,.07);--c-red-m:rgba(255,61,90,.17);
  --c-amber-d:rgba(255,176,32,.08);--c-amber-m:rgba(255,176,32,.15);
  --c-blue-d:rgba(80,144,255,.08);--c-blue-m:rgba(80,144,255,.15);
  --c-glow:rgba(0,232,122,.15);--c-pill:#0a0e1a;
  --nav:rgba(6,8,16,.88);--sh:0 2px 14px rgba(0,0,0,.22);
}
:root{
  --r:8px;--rm:13px;--rl:18px;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --snap:cubic-bezier(.22,1,.36,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--c-bg)}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  color:var(--c-t1);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:none;opacity:1}}
@keyframes shimmer{0%{background-position:-500px 0}100%{background-position:500px 0}}

.page-wrap{
  max-width:580px;
  margin:0 auto;
  padding:0 12px;
  padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));
}

/* NAV */
.lg-nav{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:var(--nav);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--c-border2);
  position:sticky;
  top:calc(var(--top,0) + env(safe-area-inset-top,0px));
  z-index:100;
  flex-wrap:wrap;
}
.lg-league-sel{
  flex:1;
  min-width:180px;
  padding:8px 12px;
  background:var(--c-s2);
  border:1px solid var(--c-border2);
  border-radius:var(--r);
  color:var(--c-t1);
  font-family:'DM Sans',sans-serif;
  font-size:.85rem;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.lg-league-sel:hover{border-color:var(--c-border3)}
.lg-league-sel:focus{outline:none;border-color:var(--c-blue);box-shadow:0 0 0 2px rgba(80,144,255,.2)}

.lg-sort-sel{
  padding:8px 12px;
  background:var(--c-s2);
  border:1px solid var(--c-border2);
  border-radius:var(--r);
  color:var(--c-t1);
  font-family:'DM Sans',sans-serif;
  font-size:.85rem;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.lg-sort-sel:hover{border-color:var(--c-border3)}

.lg-filter-btn{
  padding:8px 12px;
  background:var(--c-blue);
  color:var(--c-pill);
  border:none;
  border-radius:var(--r);
  font-size:.85rem;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.lg-filter-btn:hover{opacity:.9;transform:translateY(-1px)}
.lg-filter-btn:active{transform:scale(.95)}

/* HEADER */
.lg-header{
  padding:14px 0 8px;
  border-bottom:1px solid var(--c-border);
  margin-bottom:14px;
  animation:fadeIn .4s var(--snap);
}
.lg-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.6rem;
  font-weight:900;
  letter-spacing:.3px;
  color:var(--c-t1);
}
.lg-subtitle{
  font-size:.75rem;
  color:var(--c-t3);
  margin-top:2px;
}

/* FILTER PANEL */
.lg-filter-panel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  z-index:200;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.lg-filter-panel.open{
  display:flex;
  align-items:flex-end;
}
.lg-filter-sheet{
  background:var(--c-surface);
  border-radius:var(--rl) var(--rl) 0 0;
  width:100%;
  max-height:80vh;
  overflow-y:auto;
  padding:16px;
  padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));
  animation:slideUp .3s var(--spring);
}
.lg-filter-close{
  font-size:1.8rem;
  color:var(--c-t1);
  background:none;
  border:none;
  cursor:pointer;
  float:right;
  margin-bottom:16px;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.lg-filter-close:hover{color:var(--c-red)}

.lg-filter-group{
  margin-bottom:20px;
}
.lg-filter-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;
  font-weight:900;
  color:var(--c-t3);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:8px;
}
.lg-filter-chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.lg-chip{
  padding:6px 12px;
  background:var(--c-s2);
  border:1px solid var(--c-border2);
  border-radius:100px;
  font-size:.75rem;
  font-weight:600;
  color:var(--c-t2);
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.lg-chip:hover{border-color:var(--c-border3);background:var(--c-s3)}
.lg-chip.active{
  background:var(--c-blue);
  color:var(--c-pill);
  border-color:var(--c-blue);
  box-shadow:0 0 0 2px rgba(80,144,255,.2);
}

/* STANDINGS TABLE */
.lg-table{
  display:flex;
  flex-direction:column;
  gap:8px;
  animation:fadeIn .4s var(--snap);
}

/* MANAGER CARD */
.lg-row{
  background:var(--c-surface);
  border:1px solid var(--c-border2);
  border-radius:var(--rl);
  padding:12px;
  cursor:pointer;
  transition:all .2s;
  overflow:hidden;
}
.lg-row:hover{
  border-color:var(--c-border3);
  box-shadow:var(--sh);
  transform:translateY(-1px);
}
.lg-row.is-me{
  border-color:rgba(0,232,122,.3);
  background:linear-gradient(135deg,rgba(0,232,122,.07),var(--c-surface));
}
.lg-row.is-me:hover{
  border-color:var(--c-green);
}

.lg-row-top{
  display:grid;
  grid-template-columns:40px 1fr auto auto;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.lg-rank{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.2rem;
  font-weight:800;
  color:var(--c-green);
  text-align:center;
  line-height:1;
}
.lg-manager-info h4{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.95rem;
  font-weight:900;
  letter-spacing:.2px;
  color:var(--c-t1);
  margin-bottom:2px;
}
.lg-manager-info p{
  font-size:.7rem;
  color:var(--c-t3);
}
.lg-points{
  text-align:right;
}
.lg-points-gw{
  font-family:'Space Grotesk',sans-serif;
  font-size:1rem;
  font-weight:800;
  color:var(--c-t1);
  line-height:1;
}
.lg-points-total{
  font-size:.7rem;
  color:var(--c-t3);
  margin-top:2px;
}

/* CHIP BADGES */
.lg-chips{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.lg-badge{
  padding:2px 8px;
  border-radius:100px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.4px;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
}
.lg-badge-wc{
  background:var(--c-blue-d);
  color:var(--c-blue);
  border:1px solid rgba(80,144,255,.3);
}
.lg-badge-fh{
  background:var(--c-amber-d);
  color:var(--c-amber);
  border:1px solid rgba(255,176,32,.3);
}
.lg-badge-bb{
  background:var(--c-red-d);
  color:var(--c-red);
  border:1px solid rgba(255,61,90,.3);
}
.lg-badge-tc{
  background:var(--c-green-d);
  color:var(--c-green);
  border:1px solid rgba(0,232,122,.3);
}

/* SQUAD GRID */
.lg-squad{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:4px;
  margin-bottom:10px;
  padding:8px;
  background:var(--c-s2);
  border-radius:var(--r);
}
.lg-player{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  cursor:pointer;
  transition:transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.lg-player:hover{
  transform:scale(1.08);
}
.lg-shirt{
  width:28px;
  height:28px;
  border-radius:3px;
  background:#999;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.2));
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.lg-shirt img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.lg-position{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.45rem;
  font-weight:900;
  padding:1px 3px;
  border-radius:2px;
  text-transform:uppercase;
  text-align:center;
  width:100%;
  line-height:1;
  letter-spacing:.3px;
}
.lg-pos-gk{
  background:var(--c-amber-d);
  color:var(--c-amber);
}
.lg-pos-def{
  background:var(--c-green-d);
  color:var(--c-green);
}
.lg-pos-mid{
  background:var(--c-blue-d);
  color:var(--c-blue);
}
.lg-pos-fwd{
  background:var(--c-red-d);
  color:var(--c-red);
}
.lg-price{
  font-family:'Space Grotesk',sans-serif;
  font-size:.48rem;
  font-weight:700;
  color:var(--c-t3);
  line-height:1;
}

/* STATS ROW */
.lg-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  font-size:.75rem;
  padding:10px;
  background:var(--c-s2);
  border-radius:var(--r);
  margin-bottom:0;
}
.lg-stat{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.lg-stat-label{
  color:var(--c-t3);
  font-weight:500;
}
.lg-stat-value{
  font-family:'Space Grotesk',sans-serif;
  font-weight:800;
  color:var(--c-t1);
  font-size:.9rem;
}

/* FOOTER */
.lg-footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:var(--nav);
  border-top:1px solid var(--c-border2);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  z-index:99;
  padding-bottom:env(safe-area-inset-bottom,0px);
}

/* SKELETON */
.sk-card{
  background:linear-gradient(90deg,var(--c-s2) 25%,var(--c-s3) 50%,var(--c-s2) 75%);
  background-size:1800px 100%;
  animation:shimmer 1.6s ease-in-out infinite;
  border-radius:var(--rl);
  height:120px;
  margin-bottom:8px;
}

/* EMPTY STATE */
.lg-empty{
  text-align:center;
  padding:60px 20px;
  color:var(--c-t3);
}
.lg-empty i{
  font-size:3rem;
  opacity:.2;
  margin-bottom:12px;
  display:block;
}
.lg-empty p{
  font-size:.9rem;
  line-height:1.6;
}

/* RESPONSIVE */
@media(max-width:480px){
  .page-wrap{padding:0 8px}
  .lg-nav{flex-direction:column;padding:8px;gap:8px}
  .lg-league-sel{width:100%}
  .lg-squad{grid-template-columns:repeat(7,1fr)}
  .lg-stats{grid-template-columns:1fr 1fr;gap:6px}
  .lg-row-top{gap:8px;grid-template-columns:36px 1fr auto}
  .lg-points-gw{font-size:.9rem}
}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-wrap">
  <nav class="lg-nav">
    <select class="lg-league-sel" id="league-select" onchange="switchLeague(this.value)" aria-label="Select league">
      <option value="">Choose a League</option>
    </select>
    <select class="lg-sort-sel" id="sort-select" onchange="changeSort(this.value)" aria-label="Sort standings by">
      <option value="rank">Rank</option>
      <option value="gw">GW Points</option>
      <option value="total">Total Points</option>
      <option value="name">Name</option>
    </select>
    <button class="lg-filter-btn" onclick="openFilters()" aria-label="Open filters">
      <i class="fa-solid fa-sliders"></i> <span>Filter</span>
    </button>
  </nav>

  <div class="lg-header">
    <h1 class="lg-title" id="lg-title">League Standings</h1>
    <p class="lg-subtitle" id="lg-subtitle">—</p>
  </div>

  <div class="lg-table" id="standings-container"></div>
</div>

<div id="footer-placeholder"></div>

<!-- FILTER MODAL -->
<div class="lg-filter-panel" id="filter-panel" onclick="closeFilters(event)">
  <div class="lg-filter-sheet" onclick="event.stopPropagation()">
    <button class="lg-filter-close" onclick="closeFilters()" aria-label="Close filters">&times;</button>
    
    <div class="lg-filter-group">
      <div class="lg-filter-label">Chip Used</div>
      <div class="lg-filter-chips" id="chip-filters">
        <div class="lg-chip" data-chip="none">None</div>
        <div class="lg-chip" data-chip="wc">WC</div>
        <div class="lg-chip" data-chip="fh">FH</div>
        <div class="lg-chip" data-chip="bb">BB</div>
        <div class="lg-chip" data-chip="tc">TC</div>
      </div>
    </div>

    <div class="lg-filter-group">
      <div class="lg-filter-label">Transfers</div>
      <div class="lg-filter-chips" id="transfer-filters">
        <div class="lg-chip" data-transfers="0-2">0-2</div>
        <div class="lg-chip" data-transfers="3-4">3-4</div>
        <div class="lg-chip" data-transfers="5">5+</div>
      </div>
    </div>

    <div class="lg-filter-group">
      <div class="lg-filter-label">Overall Rank</div>
      <div class="lg-filter-chips" id="rank-filters">
        <div class="lg-chip" data-rank="100">Top 100</div>
        <div class="lg-chip" data-rank="1000">Top 1K</div>
        <div class="lg-chip" data-rank="10000">Top 10K</div>
        <div class="lg-chip" data-rank="all">All</div>
      </div>
    </div>
  </div>
</div>

<script>
const G={
  leagues:[],standings:[],players:[],teams:[],
  currentLeague:null,currentGW:1,
  sort:'rank',
  filters:{chip:null,transfers:null,rank:null},
  myId:null
};
const PROXY='/.netlify/functions/fpl-proxy?endpoint=';
const SH=(c,gk)=>`https://draft.premierleague.com/img/shirts/standard/shirt_${c}${gk?'_1':''}-66.png`;
const ESH=`onerror="this.src='https://draft.premierleague.com/img/shirts/standard/shirt_1-66.png'"`;
const POS=['','GK','DEF','MID','FWD'];
const POI=['','pos-gk','pos-def','pos-mid','pos-fwd'];

async function init(){
  G.myId=localStorage.getItem('kopala_id');
  
  try{
    showLoading();
    const bs=await fetch(`${PROXY}bootstrap-static/`).then(r=>r.json());
    G.players=bs.elements;
    G.teams=bs.teams;
    G.currentGW=(bs.events.find(e=>e.is_current)||bs.events.find(e=>e.is_next)||bs.events[0]).id;
    
    if(G.myId){
      const entry=await fetch(`${PROXY}entry/${G.myId}/`).then(r=>r.json());
      const leagues=entry.leagues.classic;
      
      document.getElementById('lg-title').textContent=`${entry.player_first_name}'s Leagues`;
      document.getElementById('league-select').innerHTML='<option value="">Choose a League</option>'+
        leagues.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');
      
      if(leagues.length>0){
        switchLeague(leagues[0].id);
      }
    }
  }catch(e){
    console.error(e);
    document.getElementById('standings-container').innerHTML='<div class="lg-empty"><i class="fa-solid fa-triangle-exclamation"></i><p>Failed to load leagues. Check your connection.</p></div>';
  }
}

async function switchLeague(leagueId){
  if(!leagueId){
    document.getElementById('standings-container').innerHTML='<div class="lg-empty"><i class="fa-solid fa-folder-open"></i><p>Select a league to view standings.</p></div>';
    return;
  }
  
  G.currentLeague=leagueId;
  showLoading();
  
  try{
    const resp=await fetch(`${PROXY}leagues-classic/${leagueId}/standings/`).then(r=>r.json());
    G.standings=resp.results||[];
    
    document.getElementById('lg-title').textContent=resp.league.name;
    document.getElementById('lg-subtitle').textContent=`${G.standings.length} managers`;
    
    await loadStandingsDetails();
    renderStandings();
  }catch(e){
    console.error(e);
    document.getElementById('standings-container').innerHTML='<div class="lg-empty"><i class="fa-solid fa-network-wired"></i><p>Failed to load standings.</p></div>';
  }
}

async function loadStandingsDetails(){
  const promises=G.standings.slice(0,30).map(s=>
    fetch(`${PROXY}entry/${s.entry}/event/${G.currentGW}/picks/`).then(r=>r.json()).catch(()=>null)
  );
  const details=await Promise.all(promises);
  G.standings.forEach((s,i)=>{
    if(details[i]) s._details=details[i];
  });
}

function renderStandings(){
  const filtered=G.standings.filter(s=>{
    if(G.filters.chip!==null && s._details){
      const chipVal=s._details.active_chip||'none';
      if(G.filters.chip!==chipVal) return false;
    }
    return true;
  }).sort((a,b)=>{
    if(G.sort==='rank') return a.rank-b.rank;
    if(G.sort==='gw') return (b.event_total||0)-(a.event_total||0);
    if(G.sort==='total') return (b.total||0)-(a.total||0);
    if(G.sort==='name') return (a.entry_name||'').localeCompare(b.entry_name||'');
    return 0;
  });

  if(!filtered.length){
    document.getElementById('standings-container').innerHTML='<div class="lg-empty"><i class="fa-solid fa-filter"></i><p>No managers match your filters.</p></div>';
    return;
  }

  document.getElementById('standings-container').innerHTML='<div class="lg-table">'+filtered.map((m,idx)=>{
    const id=m.entry;
    const details=m._details||{picks:[]};
    const chipMap={wc:'WC',fh:'FH',bb:'BB',tc:'TC'};
    const chip=details.active_chip?chipMap[details.active_chip]:null;
    const isMe=G.myId&&parseInt(G.myId)===id;
    
    return`
<div class="lg-row${isMe?' is-me':''}">
  <div class="lg-row-top">
    <div class="lg-rank">${m.rank}</div>
    <div class="lg-manager-info">
      <h4>${m.entry_name}</h4>
      <p>${m.player_name}</p>
    </div>
    <div class="lg-points">
      <div class="lg-points-gw">${m.event_total||0}</div>
      <div class="lg-points-total">${m.total||0}</div>
    </div>
  </div>
  
  ${chip?`<div class="lg-chips"><span class="lg-badge lg-badge-${chip.toLowerCase()}">${chip}</span></div>`:''}
  
  <div class="lg-squad" id="squad-${id}">
    ${buildSquadGrid(details.picks)}
  </div>
  
  <div class="lg-stats">
    <div class="lg-stat"><div class="lg-stat-label">Value</div><div class="lg-stat-value">£${(details.picks?.reduce((t,p)=>t+(G.players.find(pl=>pl.id===p.element)?.now_cost||0),0)/10).toFixed(1)}m</div></div>
    <div class="lg-stat"><div class="lg-stat-label">Bench</div><div class="lg-stat-value">${details.picks?.filter(p=>p.position>11).length||0}</div></div>
    <div class="lg-stat"><div class="lg-stat-label">Transfers</div><div class="lg-stat-value">${details.entry_history?.event_transfers||0}</div></div>
  </div>
</div>`;
  }).join('')+'</div>';
}

function buildSquadGrid(picks){
  if(!picks||!picks.length) return Array(11).fill('<div class="lg-player"><div class="lg-shirt" style="background:#666"></div></div>').join('');
  
  return picks.slice(0,11).map(p=>{
    const player=G.players.find(pl=>pl.id===p.element);
    if(!player) return '';
    const team=G.teams.find(t=>t.id===player.team);
    return`
<div class="lg-player" title="${player.web_name}">
  <div class="lg-shirt">
    <img src="${SH(team?.code||1,player.element_type===1)}" alt="${player.web_name}" loading="lazy" ${ESH}>
  </div>
  <div class="lg-position lg-${POI[player.element_type]}">${POS[player.element_type]}</div>
  <div class="lg-price">£${(player.now_cost/10).toFixed(1)}</div>
</div>`;
  }).join('');
}

function changeSort(s){G.sort=s;renderStandings();}
function openFilters(){document.getElementById('filter-panel').classList.add('open');}
function closeFilters(e){
  if(e&&e.target!==e.currentTarget) return;
  document.getElementById('filter-panel').classList.remove('open');
}
function showLoading(){
  document.getElementById('standings-container').innerHTML='<div class="lg-table">'+
    Array(8).fill('<div class="sk-card"></div>').join('')+
  '</div>';
}

document.addEventListener('click',(e)=>{
  if(e.target.closest('.lg-chip')){
    const chip=e.target.dataset.chip;
    if(chip!==undefined){
      G.filters.chip=G.filters.chip===chip?null:chip;
      renderStandings();
    }
  }
});

document.addEventListener('DOMContentLoaded',init);
</script>
