<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Kopala FPL — Fixtures & Live Scores</title>
<meta name="description" content="Live Premier League fixture results, bonus points, squad ownership and match stats for every gameweek.">
<meta name="theme-color" content="#0a0e1a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f0f2f8" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kopala FPL">
<link rel="apple-touch-icon" href="/android-chrome-192x192.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="manifest" href="manifest.json">

<script>(function(){
  var t=localStorage.getItem('kopala_theme');
  if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
})();</script>

<style>
[data-theme="light"]{
  --c-bg:#f0f2f8;--c-surface:#ffffff;--c-s2:#f5f6fa;--c-s3:#eaecf4;--c-s4:#e2e5f0;
  --c-border:rgba(0,0,0,.06);--c-border2:rgba(0,0,0,.11);--c-border3:rgba(0,0,0,.16);
  --c-t1:#0d0f1a;--c-t2:#4a4f6a;--c-t3:#9298b5;
  --c-green:#00c060;--c-green-d:rgba(0,192,96,.1);
  --c-red:#e8334a;--c-amber:#e8a020;--c-blue:#3b7fff;--c-gold:#d4a000;
  --c-nav-bg:rgba(240,242,248,.92);
  --c-shadow:rgba(0,0,0,.12);
  --c-shadow2:rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --c-bg:#0a0e1a;--c-surface:#111520;--c-s2:#181d2e;--c-s3:#1f2538;--c-s4:#252b3d;
  --c-border:rgba(255,255,255,.05);--c-border2:rgba(255,255,255,.09);--c-border3:rgba(255,255,255,.14);
  --c-t1:#eef0ff;--c-t2:#8890b8;--c-t3:#454d72;
  --c-green:#00e87a;--c-green-d:rgba(0,232,122,.1);
  --c-red:#ff3d5a;--c-amber:#ffb020;--c-blue:#5090ff;--c-gold:#ffd54f;
  --c-nav-bg:rgba(10,14,26,.92);
  --c-shadow:rgba(0,0,0,.5);
  --c-shadow2:rgba(0,0,0,.25);
}
:root{
  --top:56px;--bottom:64px;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --snap:cubic-bezier(.22,1,.36,1);
  --swipe-spring:cubic-bezier(.175,.885,.32,1.275);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--c-bg);height:-webkit-fill-available;-webkit-text-size-adjust:100%}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--c-bg);color:var(--c-t1);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:-webkit-fill-available;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(var(--bottom) + env(safe-area-inset-bottom,0px));
}

@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.78)}}
@keyframes liveGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,61,90,.45)}70%{box-shadow:0 0 0 7px rgba(255,61,90,0)}}
@keyframes stackEntrance{
  0%{opacity:0;transform:translateY(32px) scale(.92)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes flyLeft{
  0%{transform:translateX(0) rotate(0deg);opacity:1}
  100%{transform:translateX(-130%) rotate(-18deg);opacity:0}
}
@keyframes flyRight{
  0%{transform:translateX(0) rotate(0deg);opacity:1}
  100%{transform:translateX(130%) rotate(18deg);opacity:0}
}
@keyframes snapBack{
  0%{transform:var(--drag-transform,translateX(0))}
  60%{transform:translateX(6px)}
  100%{transform:translateX(0) rotate(0deg)}
}
@keyframes nextCardReveal{
  0%{transform:scale(.88) translateY(16px);opacity:.6}
  100%{transform:scale(1) translateY(0);opacity:1}
}
@keyframes counterBump{
  0%{transform:scale(1)}
  50%{transform:scale(1.35)}
  100%{transform:scale(1)}
}
@keyframes hintSwipe{
  0%{transform:translateX(0) rotate(0deg)}
  20%{transform:translateX(-18px) rotate(-2deg)}
  50%{transform:translateX(12px) rotate(1.5deg)}
  75%{transform:translateX(-6px) rotate(-.8deg)}
  100%{transform:translateX(0) rotate(0deg)}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes panelSlide{from{opacity:0;transform:translateX(5px)}to{opacity:1;transform:none}}

/* ── LAYOUT ── */
.page-wrap{
  max-width:520px;
  margin:0 auto;
  padding:0 16px 80px;
  position:relative;
}

/* ── STICKY GW NAV ── */
.gw-nav{
  position:sticky;
  top:calc(var(--top) + env(safe-area-inset-top,0px));
  z-index:200;
  background:var(--c-nav-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--c-border2);
  padding:10px 16px;
  display:flex;align-items:center;gap:9px;
}
.gw-arr{
  width:38px;height:38px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--c-s2);border:1px solid var(--c-border2);
  border-radius:var(--r-sm);color:var(--c-t2);font-size:.75rem;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all .18s var(--ease);
}
.gw-arr:hover:not(:disabled){border-color:var(--c-border3);color:var(--c-t1);background:var(--c-s3)}
.gw-arr:active:not(:disabled){transform:scale(.92)}
.gw-arr:disabled{opacity:.28;cursor:not-allowed}
.gw-tabs{
  flex:1;display:flex;
  background:var(--c-s2);border:1px solid var(--c-border2);
  border-radius:var(--r-md);padding:4px;gap:4px;
}
.gw-tab{
  flex:1;padding:8px 4px;border:none;border-radius:var(--r-sm);
  background:transparent;
  font-family:'Barlow Condensed',sans-serif;font-size:.86rem;font-weight:800;
  color:var(--c-t3);cursor:pointer;
  transition:all .2s var(--ease);
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.gw-tab:hover:not(.active){color:var(--c-t2)}
.gw-tab.active{
  background:var(--c-surface);color:var(--c-t1);
  box-shadow:0 2px 8px rgba(0,0,0,.14);
}

/* ── GW HEADER ── */
.gw-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 12px;
}
.gw-hdr-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.45rem;font-weight:900;letter-spacing:.3px;color:var(--c-t1);
}
.live-badge{
  display:none;align-items:center;gap:6px;
  font-family:'Barlow Condensed',sans-serif;font-size:.76rem;font-weight:900;
  letter-spacing:.8px;color:var(--c-red);
  background:rgba(255,61,90,.12);border:1px solid rgba(255,61,90,.25);
  border-radius:100px;padding:5px 12px;
}
.live-badge.show{display:flex}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--c-red);
  animation:livePulse 1.4s ease-in-out infinite,liveGlow 1.4s ease-in-out infinite;
}

/* ── CARD COUNTER ── */
.card-counter{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.counter-dots{display:flex;gap:5px;align-items:center}
.cdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--c-border3);
  transition:all .3s var(--spring);
}
.cdot.active{
  background:var(--c-t1);
  width:22px;border-radius:4px;
}
.cdot.done{background:var(--c-green);opacity:.5}
.counter-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;font-weight:800;letter-spacing:.5px;
  color:var(--c-t3);
}
.counter-num{
  color:var(--c-t1);
  display:inline-block;
  transition:transform .2s var(--spring);
}

/* ── SWIPE HINT ── */
.swipe-hint{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:.68rem;font-weight:600;color:var(--c-t3);
  margin-bottom:14px;opacity:0;
  transition:opacity .4s;
}
.swipe-hint.show{opacity:1}
.hint-arrow{font-size:.65rem}

/* ── STACK CONTAINER ── */
.stack-wrap{
  position:relative;
  /* Height set dynamically */
  min-height:380px;
  margin-bottom:20px;
}

/* ── CARD BASE ── */
.match-card{
  position:absolute;
  left:0;right:0;top:0;
  background:var(--c-surface);
  border:1px solid var(--c-border2);
  border-radius:var(--r-xl);
  overflow:hidden;
  transform-origin:50% 110%;
  transition:transform .4s var(--snap), box-shadow .3s var(--ease), opacity .3s;
  will-change:transform,opacity;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  cursor:grab;
}
.match-card:active{cursor:grabbing}

/* Stack depth visual */
.match-card[data-depth="0"]{
  z-index:30;
  box-shadow:0 12px 40px var(--c-shadow), 0 4px 16px var(--c-shadow2);
  transform:scale(1) translateY(0);
}
.match-card[data-depth="1"]{
  z-index:20;
  box-shadow:0 8px 24px var(--c-shadow2);
  transform:scale(.95) translateY(16px);
  pointer-events:none;
}
.match-card[data-depth="2"]{
  z-index:10;
  box-shadow:0 4px 14px var(--c-shadow2);
  transform:scale(.90) translateY(30px);
  pointer-events:none;
}
.match-card[data-depth="3"]{
  z-index:5;
  opacity:.5;
  transform:scale(.86) translateY(42px);
  pointer-events:none;
}
.match-card[data-depth="4"],
.match-card[data-depth="5"],
.match-card[data-depth="hidden"]{
  opacity:0;
  transform:scale(.84) translateY(50px);
  pointer-events:none;
}

/* Dragging state */
.match-card.dragging{
  transition:none !important;
  box-shadow:0 24px 60px var(--c-shadow), 0 8px 24px rgba(0,0,0,.3) !important;
  cursor:grabbing;
}

/* Swipe exit animations */
.match-card.fly-left{
  animation:flyLeft .42s var(--ease) forwards;
  pointer-events:none;
}
.match-card.fly-right{
  animation:flyRight .42s var(--ease) forwards;
  pointer-events:none;
}
.match-card.snap-back{
  animation:snapBack .5s var(--spring) forwards;
}

/* Live card glow */
.match-card.is-live{
  border-color:rgba(255,61,90,.3);
}
.match-card.is-live[data-depth="0"]::before{
  content:'';
  position:absolute;inset:0;border-radius:var(--r-xl);
  background:linear-gradient(160deg,rgba(255,61,90,.05),transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── SWIPE FEEDBACK OVERLAYS ── */
.swipe-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-xl);
  opacity:0;
  transition:opacity .15s;
  pointer-events:none;
  z-index:50;
}
.swipe-overlay-next{
  background:linear-gradient(135deg,rgba(0,232,122,.18),rgba(0,232,122,.05));
}
.swipe-overlay-prev{
  background:linear-gradient(225deg,rgba(80,144,255,.18),rgba(80,144,255,.05));
}
.swipe-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.4rem;font-weight:900;letter-spacing:1px;
  padding:10px 22px;border-radius:100px;border:3px solid;
  transform:rotate(-12deg);
}
.swipe-overlay-next .swipe-label{
  color:var(--c-green);border-color:var(--c-green);
  transform:rotate(-12deg);
}
.swipe-overlay-prev .swipe-label{
  color:var(--c-blue);border-color:var(--c-blue);
  transform:rotate(12deg);
}

/* ── CARD TOP BAR ── */
.card-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px 10px;
  background:var(--c-s2);
  border-bottom:1px solid var(--c-border);
  position:relative;z-index:1;
}
.card-time{
  display:flex;align-items:center;gap:7px;
  font-size:.7rem;font-weight:600;color:var(--c-t2);
}
.live-chip{
  display:flex;align-items:center;gap:4px;
  font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:900;
  color:var(--c-red);background:rgba(255,61,90,.12);
  border-radius:100px;padding:3px 8px;letter-spacing:.5px;
  animation:livePulse 2s ease-in-out infinite;
}
.live-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--c-red)}
.fdr-row{display:flex;align-items:center;gap:6px}
.fdr-tag{
  font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:900;
  padding:3px 8px;border-radius:6px;letter-spacing:.3px;
}
.fdr-sep{font-size:.56rem;font-weight:800;color:var(--c-t3);letter-spacing:1px}
.fdr-1,.fdr-2{background:rgba(0,232,122,.12);color:var(--c-green)}
.fdr-3{background:rgba(255,176,32,.12);color:var(--c-amber)}
.fdr-4{background:rgba(255,61,90,.12);color:var(--c-red)}
.fdr-5{background:rgba(180,0,30,.2);color:#ff6080}

/* ── SCORELINE ── */
.card-match{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:8px;
  padding:20px 14px 18px;
  position:relative;z-index:1;
}
.team-col{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
.team-shirt{
  width:52px;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));
  transition:transform .3s var(--spring);
  pointer-events:none;
}
.team-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.05rem;font-weight:900;letter-spacing:.3px;
  color:var(--c-t1);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;
}
.team-loc{
  font-size:.58rem;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;color:var(--c-t3);
}
.team-loc.home{color:var(--c-green)}
.score-center{display:flex;flex-direction:column;align-items:center;gap:8px;flex:0 0 110px}
.status-pill{
  font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:900;
  padding:4px 12px;border-radius:100px;letter-spacing:.5px;
}
.sft{background:var(--c-s3);color:var(--c-t2)}
.slive{background:rgba(255,61,90,.15);color:var(--c-red);animation:livePulse 2s ease-in-out infinite}
.ssched{background:var(--c-s3);color:var(--c-t3)}
.score-nums{
  font-family:'Space Grotesk',sans-serif;
  font-size:2.6rem;font-weight:800;line-height:1;
  color:var(--c-t1);letter-spacing:2px;
}
.score-sep{color:var(--c-t3);letter-spacing:0;margin:0 2px;font-weight:600}
.vs-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.1rem;font-weight:900;color:var(--c-t3);
}

/* ── MINI EVENTS ── */
.card-events{
  border-top:1px solid var(--c-border);
  padding:10px 16px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  position:relative;z-index:1;
}
.ev-col{display:flex;flex-direction:column;gap:4px}
.ev-col.home{border-right:1px solid var(--c-border);padding-right:10px;text-align:right}
.ev-col.away{padding-left:10px}
.ev-item{
  font-size:.68rem;font-weight:600;color:var(--c-t2);
  display:flex;align-items:center;gap:5px;line-height:1.3;
}
.ev-col.home .ev-item{justify-content:flex-end}
.ev-icon{font-size:.54rem;flex-shrink:0}
.ic-goal{color:var(--c-t1)}.ic-assist{color:var(--c-blue)}.ic-og{color:var(--c-red)}
.ic-pen{color:var(--c-amber)}.ic-yellow{color:var(--c-gold)}.ic-red{color:var(--c-red)}
.ic-save{color:var(--c-green)}

/* ── BONUS ROW ── */
.card-bonus{
  border-top:1px solid var(--c-border);
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:relative;z-index:1;
}
.bonus-lbl{font-size:.6rem;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--c-t3);flex-shrink:0}
.bonus-list{display:flex;gap:8px;flex-wrap:wrap}
.bonus-item{display:flex;align-items:center;gap:5px;font-size:.71rem;font-weight:600;color:var(--c-t2)}
.bonus-pts{
  font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:800;
  background:var(--c-green);color:#000;padding:1px 6px;border-radius:5px;
}

/* ── SWIPE ACTIONS ROW ── */
.card-actions{
  border-top:1px solid var(--c-border);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
  position:relative;z-index:1;
}
.action-btn{
  flex:1;padding:9px 6px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--c-s2);border:1px solid var(--c-border2);
  border-radius:var(--r-md);
  font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;
  color:var(--c-t3);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all .18s var(--ease);
}
.action-btn:hover{background:var(--c-s3);color:var(--c-t2);border-color:var(--c-border3)}
.action-btn:active{transform:scale(.96)}
.action-btn i{font-size:.62rem}
.action-btn.expand-btn{flex:2}
.action-btn.prev-btn:hover{color:var(--c-blue);border-color:rgba(80,144,255,.3);background:rgba(80,144,255,.06)}
.action-btn.next-btn:hover{color:var(--c-green);border-color:rgba(0,232,122,.3);background:rgba(0,232,122,.06)}

/* ── DRAWER ── */
.card-drawer{
  max-height:0;overflow:hidden;
  transition:max-height .4s var(--snap);
  border-top:0px solid var(--c-border);
  position:relative;z-index:1;
}
.match-card.open .card-drawer{
  max-height:600px;
  border-top:1px solid var(--c-border);
}
.drawer-tabs{
  display:flex;
  background:var(--c-s2);
  border-bottom:1px solid var(--c-border);
}
.dtab{
  flex:1;padding:11px 6px;
  font-family:'DM Sans',sans-serif;font-size:.67rem;font-weight:700;
  color:var(--c-t3);text-align:center;cursor:pointer;
  border-bottom:2px solid transparent;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.dtab:hover{color:var(--c-t2)}
.dtab.active{color:var(--c-green);border-bottom-color:var(--c-green)}
.dtab i{font-size:.56rem}
.dpanel{display:none;padding:14px;animation:panelSlide .25s var(--snap)}
.dpanel.active{display:block}

/* ── OWNERSHIP TABLE ── */
.own-table{width:100%;border-collapse:collapse}
.own-table tr{border-bottom:1px solid var(--c-border);transition:background .15s}
.own-table tr:last-child{border-bottom:none}
.own-table td{padding:8px 5px;font-size:.7rem;vertical-align:middle}
.own-shirt{width:22px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.2))}
.own-name{font-weight:700;color:var(--c-t1);font-size:.74rem}
.own-price{font-size:.6rem;color:var(--c-t3);margin-top:1px}
.pos-b{font-size:.56rem;font-weight:800;padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;display:inline-block}
.pos-gk{background:rgba(255,176,32,.12);color:var(--c-amber)}
.pos-def{background:rgba(0,232,122,.12);color:var(--c-green)}
.pos-mid{background:rgba(80,144,255,.12);color:var(--c-blue)}
.pos-fwd{background:rgba(255,61,90,.12);color:var(--c-red)}
.own-bar{width:52px;height:4px;background:var(--c-s4);border-radius:100px;overflow:hidden;margin:0 auto}
.own-bar-f{height:100%;background:linear-gradient(90deg,var(--c-green),#00c060);border-radius:100px;transition:width .7s var(--snap)}
.own-pct{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:800;color:var(--c-t1);text-align:right}

/* ── STATS PANEL ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.stat-side{display:flex;flex-direction:column;gap:9px}
.stat-side:first-child{border-right:1px solid var(--c-border);padding-right:14px}
.stat-side:last-child{padding-left:14px}
.stat-team-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:900;color:var(--c-t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.stat-row{display:flex;justify-content:space-between;align-items:center}
.stat-lbl{font-size:.66rem;color:var(--c-t3);font-weight:600}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:800;color:var(--c-t1)}
.stat-pos{color:var(--c-green)}.stat-neg{color:var(--c-red)}

/* ── EVENTS PANEL ── */
.ep-section{margin-bottom:13px}
.ep-section:last-child{margin-bottom:0}
.ep-title{font-size:.6rem;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--c-t3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ep-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
.ep-side{display:flex;flex-direction:column;gap:4px}
.ep-side.home{border-right:1px solid var(--c-border);padding-right:12px;text-align:right}
.ep-side.away{padding-left:12px}
.ep-entry{font-size:.68rem;font-weight:600;color:var(--c-t2);display:flex;align-items:center;gap:5px}
.ep-side.home .ep-entry{justify-content:flex-end}
.ep-empty{font-size:.66rem;color:var(--c-t3)}

/* ── SKELETON ── */
.sk-card{
  height:220px;border-radius:var(--r-xl);margin-bottom:10px;
  background:linear-gradient(90deg,var(--c-s2) 25%,var(--c-s3) 50%,var(--c-s2) 75%);
  background-size:1200px 100%;animation:shimmer 1.8s ease-in-out infinite;
}

/* ── EMPTY / ERROR ── */
.empty-state{text-align:center;padding:50px 20px;color:var(--c-t3)}
.empty-state i{font-size:2.2rem;margin-bottom:12px;display:block;opacity:.4}
.empty-state p{font-size:.86rem;line-height:1.6;color:var(--c-t2)}

/* ── DONE SCREEN ── */
.stack-done{
  text-align:center;padding:50px 20px;
  animation:fadeUp .5s var(--snap);
}
.stack-done-icon{
  font-size:3rem;margin-bottom:16px;
  animation:stackEntrance .6s var(--spring);
}
.stack-done h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.6rem;font-weight:900;color:var(--c-t1);margin-bottom:8px;
}
.stack-done p{font-size:.82rem;color:var(--c-t3);margin-bottom:24px}
.restart-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 22px;
  background:var(--c-green);color:#000;
  border:none;border-radius:100px;
  font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:.5px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .2s,transform .15s;
  box-shadow:0 4px 20px rgba(0,232,122,.3);
}
.restart-btn:hover{opacity:.88}
.restart-btn:active{transform:scale(.96)}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap">
<link rel="stylesheet" media="print" onload="this.media='all'" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-wrap">
  <!-- GW NAV -->
  <nav class="gw-nav" aria-label="Gameweek navigation">
    <button class="gw-arr" id="btn-prev" onclick="shiftGW(-1)" aria-label="Previous gameweek" disabled>
      <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
    </button>
    <div class="gw-tabs" role="tablist">
      <button class="gw-tab" id="tab-prev" role="tab" onclick="jumpRel(-1)">Prev GW</button>
      <button class="gw-tab active" id="tab-curr" role="tab" onclick="jumpRel(0)">Current</button>
      <button class="gw-tab" id="tab-next" role="tab" onclick="jumpRel(1)">Next GW</button>
    </div>
    <button class="gw-arr" id="btn-next" onclick="shiftGW(1)" aria-label="Next gameweek" disabled>
      <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
    </button>
  </nav>

  <!-- GW HEADER -->
  <div class="gw-hdr">
    <h1 class="gw-hdr-title" id="gw-title">Gameweek —</h1>
    <div class="live-badge" id="live-badge">
      <div class="live-dot" aria-hidden="true"></div>
      <span>LIVE</span>
    </div>
  </div>

  <!-- COUNTER + HINT -->
  <div class="card-counter" id="card-counter" style="display:none">
    <div class="counter-dots" id="counter-dots"></div>
    <div class="counter-txt"><span class="counter-num" id="counter-num">1</span> / <span id="counter-total">—</span></div>
  </div>
  <div class="swipe-hint" id="swipe-hint">
    <span class="hint-arrow">←</span> swipe to browse <span class="hint-arrow">→</span>
  </div>

  <!-- STACK -->
  <div class="stack-wrap" id="stack-wrap"></div>
</div>

<div id="footer-placeholder"></div>

<script>
/* ── STATE ── */
let G={
  players:[],teams:[],currentGW:1,maxGW:38,viewGW:1,
  cache:{},myPicks:new Set(),refreshTimer:null,
  stack:[],        // rendered card elements
  current:0,       // index of top card
  total:0,         // total cards in stack
  isDragging:false,
  hintShown:false,
};
const PROXY='/.netlify/functions/fpl-proxy?endpoint=';
const SH=(code,gk)=>`https://draft.premierleague.com/img/shirts/standard/shirt_${code}${gk?'_1':''}-66.png`;
const ESH=`onerror="this.src='https://draft.premierleague.com/img/shirts/standard/shirt_1-66.png'"`;
const PL=['','GK','DEF','MID','FWD'];
const PC=['','pos-gk','pos-def','pos-mid','pos-fwd'];

/* ── INIT ── */
async function init(){
  showSkel();
  try{
    const fplId=localStorage.getItem('kopala_id');
    const bsRes=await fetch(`${PROXY}bootstrap-static/`);
    const bs=await bsRes.json();
    G.players=bs.elements;G.teams=bs.teams;G.maxGW=bs.events.length;
    const cur=bs.events.find(e=>e.is_current)||bs.events.find(e=>e.is_next)||bs.events[0];
    G.currentGW=cur.id;G.viewGW=G.currentGW;
    if(fplId){try{const pR=await fetch(`${PROXY}entry/${fplId}/event/${G.currentGW}/picks/`);if(pR.ok){const pd=await pR.json();pd.picks.forEach(p=>G.myPicks.add(p.element));}}catch{}}
    await Promise.all([G.currentGW-1,G.currentGW,G.currentGW+1].filter(g=>g>=1&&g<=G.maxGW).map(fetchFixtures));
    renderGW(G.currentGW);
    startAutoRefresh();
  }catch(e){
    console.error(e);
    document.getElementById('stack-wrap').innerHTML=`<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Failed to load fixtures.<br>Check your connection and refresh.</p></div>`;
  }
}

async function fetchFixtures(gw){
  if(G.cache[gw])return;
  try{const r=await fetch(`${PROXY}fixtures/?event=${gw}`);G.cache[gw]=await r.json();}
  catch{G.cache[gw]=[];}
}

/* ── GW NAV ── */
async function shiftGW(dir){
  const next=G.viewGW+dir;
  if(next<1||next>G.maxGW)return;
  G.viewGW=next;showSkel();
  await fetchFixtures(G.viewGW);renderGW(G.viewGW);
}
async function jumpRel(off){
  const target=G.currentGW+off;
  if(target<1||target>G.maxGW)return;
  G.viewGW=target;
  await fetchFixtures(G.viewGW);renderGW(G.viewGW);
}
function syncNav(){
  const off=G.viewGW-G.currentGW;
  ['prev','curr','next'].forEach((id,i)=>{
    const t=document.getElementById(`tab-${id}`);
    const isActive=i-1===off;
    if(t){t.classList.toggle('active',isActive);t.setAttribute('aria-selected',isActive);}
  });
  const bp=document.getElementById('btn-prev'),bn=document.getElementById('btn-next');
  if(bp)bp.disabled=G.viewGW<=1;if(bn)bn.disabled=G.viewGW>=G.maxGW;
}

function startAutoRefresh(){
  clearInterval(G.refreshTimer);
  G.refreshTimer=setInterval(async()=>{
    if(G.viewGW!==G.currentGW)return;
    const fx=G.cache[G.currentGW]||[];
    if(!fx.some(f=>f.started&&!f.finished))return;
    delete G.cache[G.currentGW];
    await fetchFixtures(G.currentGW);renderGW(G.currentGW);
  },60000);
}

/* ── RENDER GW → STACK ── */
function renderGW(gw){
  document.getElementById('gw-title').textContent=`Gameweek ${gw}`;
  syncNav();
  const fx=G.cache[gw]||[];
  const wrap=document.getElementById('stack-wrap');
  if(!fx.length){
    wrap.innerHTML='<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><p>No fixtures found.</p></div>';
    document.getElementById('card-counter').style.display='none';
    document.getElementById('live-badge').classList.remove('show');
    return;
  }
  const sorted=[...fx].sort((a,b)=>{
    const al=a.started&&!a.finished?0:1,bl=b.started&&!b.finished?0:1;
    if(al!==bl)return al-bl;
    return new Date(a.kickoff_time)-new Date(b.kickoff_time);
  });
  const hasLive=sorted.some(f=>f.started&&!f.finished);
  document.getElementById('live-badge').classList.toggle('show',hasLive);

  // Build cards
  wrap.innerHTML='';
  G.stack=[];
  G.current=0;
  G.total=sorted.length;

  sorted.forEach((f,i)=>{
    const card=buildCardEl(f,i);
    wrap.appendChild(card);
    G.stack.push(card);
  });

  // Set stack depths & sizes
  layoutStack();
  setStackHeight();
  initSwipe(G.stack[0]);

  // Counter
  updateCounter();
  document.getElementById('card-counter').style.display='flex';

  // Hint
  if(!G.hintShown&&G.total>1){
    setTimeout(()=>{
      document.getElementById('swipe-hint').classList.add('show');
      G.hintShown=true;
      // Play hint animation on top card
      if(G.stack[0]){
        G.stack[0].style.animation='hintSwipe 1.2s var(--spring)';
        setTimeout(()=>{if(G.stack[0])G.stack[0].style.animation='';},1300);
      }
      setTimeout(()=>document.getElementById('swipe-hint').classList.remove('show'),3500);
    },800);
  }
}

/* ── LAYOUT STACK DEPTHS ── */
function layoutStack(){
  G.stack.forEach((card,i)=>{
    const depth=i-G.current;
    if(depth<0){
      card.setAttribute('data-depth','hidden');
    } else {
      card.setAttribute('data-depth',String(Math.min(depth,5)));
    }
  });
}

function setStackHeight(){
  const wrap=document.getElementById('stack-wrap');
  // Measure top card height
  const top=G.stack[G.current];
  if(!top){wrap.style.minHeight='380px';return;}
  // Use offsetHeight after a frame
  requestAnimationFrame(()=>{
    const h=top.offsetHeight;
    // Extra space for stack peek effect
    wrap.style.minHeight=(h+52)+'px';
  });
}

/* ── UPDATE COUNTER ── */
function updateCounter(){
  const num=document.getElementById('counter-num');
  const tot=document.getElementById('counter-total');
  if(num){
    num.style.animation='counterBump .3s var(--spring)';
    setTimeout(()=>num.style.animation='',320);
    num.textContent=G.current+1;
  }
  if(tot)tot.textContent=G.total;

  // Dots (max 10 shown)
  const dotsEl=document.getElementById('counter-dots');
  if(dotsEl){
    const max=Math.min(G.total,10);
    dotsEl.innerHTML='';
    for(let i=0;i<max;i++){
      const d=document.createElement('div');
      d.className='cdot'+(i===G.current?' active':i<G.current?' done':'');
      dotsEl.appendChild(d);
    }
  }
}

/* ── NAVIGATE STACK ── */
function goNext(fromSwipe=false){
  if(G.current>=G.total-1){showDone();return;}
  const card=G.stack[G.current];
  if(!fromSwipe){
    card.classList.add('fly-left');
    setTimeout(()=>{card.setAttribute('data-depth','hidden');card.classList.remove('fly-left');},440);
  } else {
    card.setAttribute('data-depth','hidden');
  }
  G.current++;
  layoutStack();
  setStackHeight();
  updateCounter();
  const next=G.stack[G.current];
  if(next){
    initSwipe(next);
    // Bump up animation
    next.style.transition='none';
    requestAnimationFrame(()=>{
      next.style.transition='';
    });
  }
}

function goPrev(){
  if(G.current<=0)return;
  G.current--;
  layoutStack();
  setStackHeight();
  updateCounter();
  const card=G.stack[G.current];
  if(card){
    initSwipe(card);
    // Animate in from right
    card.style.transform='translateX(80px) rotate(4deg)';
    card.style.opacity='0';
    card.style.transition='none';
    requestAnimationFrame(()=>{
      card.style.transition='';
      card.style.transform='';
      card.style.opacity='';
    });
  }
}

function showDone(){
  const wrap=document.getElementById('stack-wrap');
  wrap.innerHTML=`
    <div class="stack-done">
      <div class="stack-done-icon">🏁</div>
      <h3>All caught up!</h3>
      <p>You've seen all ${G.total} fixtures for this gameweek.</p>
      <button class="restart-btn" onclick="restartStack()">
        <i class="fa-solid fa-rotate-left"></i> See them again
      </button>
    </div>`;
  document.getElementById('card-counter').style.display='none';
}

function restartStack(){
  G.current=0;
  const wrap=document.getElementById('stack-wrap');
  wrap.innerHTML='';
  G.stack.forEach(card=>{wrap.appendChild(card);});
  layoutStack();
  setStackHeight();
  updateCounter();
  document.getElementById('card-counter').style.display='flex';
  if(G.stack[0])initSwipe(G.stack[0]);
}

/* ── SWIPE ENGINE ── */
function initSwipe(card){
  if(!card)return;
  // Remove old listeners
  const newCard=card.cloneNode(true);
  card.parentNode&&card.parentNode.replaceChild(newCard,card);
  G.stack[G.current]=newCard;
  const c=newCard;

  let startX=0,startY=0,curX=0,isDrag=false,locked=false;

  const onStart=e=>{
    if(locked)return;
    if(e.target.closest('button,a,select,input,.card-toggle,.dtab'))return;
    isDrag=true;
    G.isDragging=false;
    const pt=e.touches?e.touches[0]:e;
    startX=pt.clientX;startY=pt.clientY;curX=0;
    c.classList.add('dragging');
    c.style.transition='none';
  };
  const onMove=e=>{
    if(!isDrag)return;
    const pt=e.touches?e.touches[0]:e;
    const dx=pt.clientX-startX;
    const dy=pt.clientY-startY;
    if(!G.isDragging&&Math.abs(dy)>Math.abs(dx)*1.5){isDrag=false;c.classList.remove('dragging');return;}
    G.isDragging=true;
    if(e.cancelable)e.preventDefault();
    curX=dx;
    const rot=dx*0.06;
    const lift=Math.abs(dx)*0.04;
    c.style.transform=`translateX(${dx}px) rotate(${rot}deg) translateY(-${lift}px)`;
    c.style.setProperty('--drag-transform',`translateX(${dx}px) rotate(${rot}deg)`);

    // Overlays
    const nextOv=c.querySelector('.swipe-overlay-next');
    const prevOv=c.querySelector('.swipe-overlay-prev');
    const pct=Math.min(Math.abs(dx)/120,1);
    if(nextOv)nextOv.style.opacity=dx>0?pct*0.9:'0';
    if(prevOv)prevOv.style.opacity=dx<0?pct*0.9:'0';

    // Scale up next card in stack
    const nextCard=G.stack[G.current+1];
    if(nextCard){
      const scale=0.95+Math.min(Math.abs(dx)/300,1)*0.05;
      const ty=16-Math.min(Math.abs(dx)/300,1)*16;
      nextCard.style.transition='none';
      nextCard.style.transform=`scale(${scale}) translateY(${ty}px)`;
    }
  };
  const onEnd=e=>{
    if(!isDrag)return;
    isDrag=false;
    c.classList.remove('dragging');
    c.style.transition='';
    const nextCard=G.stack[G.current+1];
    if(nextCard)nextCard.style.transition='';

    const threshold=80;
    if(curX>threshold){
      // Swipe right = go prev
      locked=true;
      c.style.transition='none';
      c.classList.add('fly-right');
      // Overlays off
      const prevOv=c.querySelector('.swipe-overlay-prev');
      if(prevOv)prevOv.style.opacity='0';
      setTimeout(()=>{c.classList.remove('fly-right');locked=false;goPrev();},440);
    } else if(curX<-threshold){
      // Swipe left = go next
      locked=true;
      c.classList.add('fly-left');
      const nextOv=c.querySelector('.swipe-overlay-next');
      if(nextOv)nextOv.style.opacity='0';
      setTimeout(()=>{c.classList.remove('fly-left');locked=false;goNext(true);},440);
    } else {
      // Snap back
      c.classList.add('snap-back');
      c.style.transform='';
      const nextOv=c.querySelector('.swipe-overlay-next');
      const prevOv=c.querySelector('.swipe-overlay-prev');
      if(nextOv)nextOv.style.opacity='0';
      if(prevOv)prevOv.style.opacity='0';
      // Reset next card
      if(nextCard){
        nextCard.style.transition='';
        nextCard.style.transform='';
      }
      setTimeout(()=>c.classList.remove('snap-back'),520);
    }
    curX=0;G.isDragging=false;
  };

  c.addEventListener('touchstart',onStart,{passive:true});
  c.addEventListener('touchmove',onMove,{passive:false});
  c.addEventListener('touchend',onEnd);
  c.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',onMove,{once:false});
  document.addEventListener('mouseup',onEnd,{once:false});

  // Re-attach drawer toggle
  const tog=c.querySelector('.card-toggle');
  if(tog){
    const fid=tog.dataset.fid;
    tog.addEventListener('click',e=>{if(G.isDragging)return;toggleCard(fid,c);});
  }
  // Re-attach tab clicks
  c.querySelectorAll('.dtab').forEach(tab=>{
    tab.addEventListener('click',e=>{
      if(G.isDragging)return;
      const fid=tab.dataset.fid,panel=tab.dataset.panel;
      switchTab(fid,panel,c);
    });
  });
  // Action buttons
  const prevBtn=c.querySelector('.prev-btn');
  const nextBtn=c.querySelector('.next-btn');
  const expBtn=c.querySelector('.expand-btn');
  if(prevBtn)prevBtn.addEventListener('click',()=>{if(!G.isDragging)goPrev();});
  if(nextBtn)nextBtn.addEventListener('click',()=>{if(!G.isDragging)goNext();});
  if(expBtn){
    const fid=expBtn.dataset.fid;
    expBtn.addEventListener('click',()=>{if(!G.isDragging)toggleCard(fid,c);});
  }
}

/* ── BUILD CARD ELEMENT ── */
function buildCardEl(f,idx){
  const div=document.createElement('div');
  div.innerHTML=buildCardHTML(f,idx);
  const card=div.firstElementChild;
  return card;
}

function buildCardHTML(f,idx){
  const hT=G.teams.find(t=>t.id===f.team_h),aT=G.teams.find(t=>t.id===f.team_a);
  if(!hT||!aT)return'';
  const isLive=f.started&&!f.finished,isDone=f.finished||f.finished_provisional;
  const hS=SH(hT.code,false),aS=SH(aT.code,false);
  const hDiff=f.team_h_difficulty||3,aDiff=f.team_a_difficulty||3;

  let timeHtml='';
  if(isLive)timeHtml=`<div class="live-chip"><div class="live-chip-dot"></div>LIVE ${getMin(f)}</div>`;
  else if(isDone)timeHtml=`<span>Full Time</span>`;
  else timeHtml=`<span>${fmtDateTime(f.kickoff_time)}</span>`;

  let statusTxt=isDone?'FT':isLive?getMin(f):formatTime(f.kickoff_time);
  let statusCls=isDone?'sft':isLive?'slive':'ssched';

  const{hEv,aEv}=buildEvs(f);
  const hasEvs=hEv.length||aEv.length;
  const evsHtml=hasEvs?`<div class="card-events"><div class="ev-col home">${hEv.join('')}</div><div class="ev-col away">${aEv.join('')}</div></div>`:'';
  const bonusHtml=buildBonus(f,isDone);

  return`
<div class="match-card${isLive?' is-live':''}" id="card-${f.id}" role="listitem">
  <!-- Swipe overlays -->
  <div class="swipe-overlay swipe-overlay-next" aria-hidden="true">
    <div class="swipe-label">NEXT →</div>
  </div>
  <div class="swipe-overlay swipe-overlay-prev" aria-hidden="true">
    <div class="swipe-label">← BACK</div>
  </div>

  <div class="card-topbar">
    <div class="card-time">${timeHtml}</div>
    <div class="fdr-row">
      <span class="fdr-tag fdr-${hDiff}">${hT.short_name}</span>
      <span class="fdr-sep">FDR</span>
      <span class="fdr-tag fdr-${aDiff}">${aT.short_name}</span>
    </div>
  </div>

  <div class="card-match">
    <div class="team-col">
      <img class="team-shirt" src="${hS}" alt="${hT.name}" loading="lazy" ${ESH}>
      <div class="team-name">${hT.short_name}</div>
      <div class="team-loc home">HOME</div>
    </div>
    <div class="score-center">
      <div class="status-pill ${statusCls}">${statusTxt}</div>
      ${f.started
        ?`<div class="score-nums"><span>${f.team_h_score}</span><span class="score-sep">:</span><span>${f.team_a_score}</span></div>`
        :`<div class="vs-txt">VS</div>`
      }
    </div>
    <div class="team-col">
      <img class="team-shirt" src="${aS}" alt="${aT.name}" loading="lazy" ${ESH}>
      <div class="team-name">${aT.short_name}</div>
      <div class="team-loc">AWAY</div>
    </div>
  </div>

  ${evsHtml}
  ${bonusHtml}

  <div class="card-actions">
    <button class="action-btn prev-btn" aria-label="Previous match">
      <i class="fa-solid fa-chevron-left"></i> Prev
    </button>
    <button class="action-btn expand-btn" data-fid="${f.id}" aria-label="More details">
      <i class="fa-solid fa-chart-line"></i> Details
    </button>
    <button class="action-btn next-btn" aria-label="Next match">
      Next <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>

  <div class="card-drawer" id="drawer-${f.id}">
    <div class="drawer-tabs">
      <button class="dtab active" data-fid="${f.id}" data-panel="own">
        <i class="fa-solid fa-users"></i><span>Ownership</span>
      </button>
      <button class="dtab" data-fid="${f.id}" data-panel="stats">
        <i class="fa-solid fa-chart-bar"></i><span>Stats</span>
      </button>
      ${f.started?`<button class="dtab" data-fid="${f.id}" data-panel="ev"><i class="fa-solid fa-list"></i><span>Events</span></button>`:''}
    </div>
    <div class="dpanel active" id="dpanel-own-${f.id}">${buildOwn(f.team_h,f.team_a)}</div>
    <div class="dpanel" id="dpanel-stats-${f.id}">${buildStats(f,hT,aT)}</div>
    ${f.started?`<div class="dpanel" id="dpanel-ev-${f.id}">${buildEvPanel(f)}</div>`:''}
  </div>
</div>`;
}

/* ── CARD INTERACTIONS ── */
function toggleCard(fid,cardEl){
  const card=cardEl||document.getElementById(`card-${fid}`);
  if(!card)return;
  const wasOpen=card.classList.toggle('open');
  const btn=card.querySelector('.expand-btn');
  if(btn)btn.innerHTML=wasOpen
    ?'<i class="fa-solid fa-chevron-up"></i> Less'
    :'<i class="fa-solid fa-chart-line"></i> Details';
  // Recalc height
  setTimeout(()=>setStackHeight(),420);
}
function switchTab(fid,panel,cardEl){
  const scope=cardEl||document.getElementById(`card-${fid}`);
  if(!scope)return;
  ['own','stats','ev'].forEach(p=>{
    const tab=scope.querySelector(`[data-panel="${p}"]`);
    const pnl=scope.querySelector(`#dpanel-${p}-${fid}`);
    if(tab){tab.classList.toggle('active',p===panel);tab.setAttribute('aria-selected',p===panel);}
    if(pnl)pnl.classList.toggle('active',p===panel);
  });
  setTimeout(()=>setStackHeight(),50);
}

/* ── HELPERS ── */
function getMin(f){if(f.finished||f.finished_provisional)return'FT';if(!f.started)return'';if(f.minutes>0)return`${f.minutes}'`;const el=Math.floor((Date.now()-new Date(f.kickoff_time))/60000);if(el>45&&el<60)return'HT';return`${Math.min(90,Math.max(1,el>=60?el-15:el))}'`;}
function formatTime(iso){return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDateTime(iso){const d=new Date(iso);return d.toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function pName(id){return G.players.find(p=>p.id===id)?.web_name||'?';}
function getStat(f,sid){const s=(f.stats||[]).find(s=>s.identifier===sid);return s?{h:s.h||[],a:s.a||[]}:{h:[],a:[]};}

function buildEvs(f){
  if(!f.started)return{hEv:[],aEv:[]};
  const hEv=[],aEv=[];
  const defs=[
    {id:'goals_scored',icon:'fa-futbol',cls:'ic-goal'},
    {id:'assists',icon:'fa-circle-dot',cls:'ic-assist'},
    {id:'own_goals',icon:'fa-futbol',cls:'ic-og',sfx:' (OG)'},
    {id:'penalties_scored',icon:'fa-circle',cls:'ic-pen',sfx:' (P)'},
    {id:'yellow_cards',icon:'fa-square',cls:'ic-yellow'},
    {id:'red_cards',icon:'fa-square',cls:'ic-red'},
  ];
  defs.forEach(({id,icon,cls,sfx=''})=>{
    const st=getStat(f,id);
    st.h.forEach(e=>{const cnt=e.value>1?` ×${e.value}`:'';hEv.push(`<div class="ev-item"><i class="fa-solid ${icon} ev-icon ${cls}"></i><span>${pName(e.element)}${cnt}${sfx}</span></div>`);});
    st.a.forEach(e=>{const cnt=e.value>1?` ×${e.value}`:'';aEv.push(`<div class="ev-item"><i class="fa-solid ${icon} ev-icon ${cls}"></i><span>${pName(e.element)}${cnt}${sfx}</span></div>`);});
  });
  return{hEv,aEv};
}

function buildBonus(f,isDone){
  const sid=isDone?'bonus':'bps';
  const st=getStat(f,sid);
  const all=[...st.h,...st.a].sort((a,b)=>b.value-a.value).slice(0,3);
  if(!all.length)return'';
  const items=all.map((p,i)=>{
    const pts=isDone?p.value:3-i;
    const isMine=G.myPicks.has(p.element);
    return`<div class="bonus-item"><span>${pName(p.element)}${isMine?'<i class="fa-solid fa-star" style="color:var(--c-amber);font-size:.52rem;margin-left:3px"></i>':''}</span><span class="bonus-pts">${pts}</span></div>`;
  }).join('');
  return`<div class="card-bonus"><span class="bonus-lbl">${isDone?'Bonus Pts':'BPS'}</span><div class="bonus-list">${items}</div></div>`;
}

function buildOwn(htId,atId){
  const rel=G.players.filter(p=>p.team===htId||p.team===atId)
    .sort((a,b)=>parseFloat(b.selected_by_percent)-parseFloat(a.selected_by_percent))
    .slice(0,12);
  if(!rel.length)return'<div style="padding:16px;text-align:center;font-size:.76rem;color:var(--c-t3)">No data.</div>';
  const rows=rel.map(p=>{
    const t=G.teams.find(t=>t.id===p.team);
    const own=parseFloat(p.selected_by_percent)||0;
    const s=SH(t?.code||1,p.element_type===1);
    const isMine=G.myPicks.has(p.id);
    return`<tr>
      <td style="width:26px"><img class="own-shirt" src="${s}" alt="" loading="lazy" ${ESH}></td>
      <td><div class="own-name">${p.web_name}${isMine?'<i class="fa-solid fa-check-circle" style="color:var(--c-green);font-size:.58rem;margin-left:4px"></i>':''}</div><div class="own-price">£${(p.now_cost/10).toFixed(1)}m · ${t?.short_name||''}</div></td>
      <td><span class="pos-b ${PC[p.element_type]}">${PL[p.element_type]}</span></td>
      <td><div class="own-bar"><div class="own-bar-f" style="width:${Math.min(100,own*3.33)}%"></div></div></td>
      <td class="own-pct">${own}%</td>
    </tr>`;
  }).join('');
  return`<table class="own-table">${rows}</table>`;
}

function buildStats(f,hT,aT){
  const hp=G.players.filter(p=>p.team===f.team_h);
  const ap=G.players.filter(p=>p.team===f.team_a);
  const sum=(arr,k)=>arr.reduce((t,p)=>t+(parseFloat(p[k])||0),0);
  const side=(t,pl,fdr)=>`<div class="stat-side">
    <div class="stat-team-lbl">${t.short_name}</div>
    <div class="stat-row"><span class="stat-lbl">xG / 90</span><span class="stat-val stat-pos">${sum(pl,'expected_goals_per_90').toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-lbl">xGC / 90</span><span class="stat-val stat-neg">${sum(pl.filter(p=>p.element_type<=2),'expected_goals_conceded_per_90').toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-lbl">Form</span><span class="stat-val">${sum(pl,'form').toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-lbl">FDR</span><span class="fdr-tag fdr-${fdr}">${fdr}</span></div>
    <div class="stat-row"><span class="stat-lbl">Transfers In</span><span class="stat-val" style="font-size:.76rem">${pl.reduce((t,p)=>t+(parseInt(p.transfers_in_event)||0),0).toLocaleString()}</span></div>
  </div>`;
  return`<div class="stats-grid">${side(hT,hp,f.team_h_difficulty||3)}${side(aT,ap,f.team_a_difficulty||3)}</div>`;
}

function buildEvPanel(f){
  const defs=[
    {id:'goals_scored',label:'Goals',icon:'fa-futbol',cls:'ic-goal'},
    {id:'assists',label:'Assists',icon:'fa-circle-dot',cls:'ic-assist'},
    {id:'own_goals',label:'Own Goals',icon:'fa-futbol',cls:'ic-og'},
    {id:'penalties_scored',label:'Penalties',icon:'fa-circle',cls:'ic-pen'},
    {id:'yellow_cards',label:'Yellow Cards',icon:'fa-square',cls:'ic-yellow'},
    {id:'red_cards',label:'Red Cards',icon:'fa-square',cls:'ic-red'},
    {id:'saves',label:'Saves',icon:'fa-hand',cls:'ic-save'},
    {id:'bonus',label:'Bonus Points',icon:'fa-star',cls:'ic-goal'},
  ];
  let html='';
  defs.forEach(({id,label,icon,cls})=>{
    const st=getStat(f,id);if(!st.h.length&&!st.a.length)return;
    const buildSide=arr=>arr.length?arr.map(e=>`<div class="ep-entry"><i class="fa-solid ${icon} ev-icon ${cls}"></i><span>${pName(e.element)}${e.value>1?` ×${e.value}`:''}</span></div>`).join(''):'<div class="ep-empty">—</div>';
    html+=`<div class="ep-section"><div class="ep-title"><i class="fa-solid ${icon} ${cls}" style="font-size:.58rem"></i>${label}</div><div class="ep-cols"><div class="ep-side home">${buildSide(st.h)}</div><div class="ep-side away">${buildSide(st.a)}</div></div></div>`;
  });
  return html||'<div style="text-align:center;padding:16px;font-size:.74rem;color:var(--c-t3)">No events yet.</div>';
}

function showSkel(){
  const wrap=document.getElementById('stack-wrap');
  wrap.innerHTML=`<div class="sk-card"></div><div class="sk-card" style="position:absolute;top:0;left:0;right:0;transform:scale(.95) translateY(14px);z-index:-1;opacity:.6;animation-delay:.1s"></div><div class="sk-card" style="position:absolute;top:0;left:0;right:0;transform:scale(.9) translateY(26px);z-index:-2;opacity:.35;animation-delay:.2s"></div>`;
  document.getElementById('card-counter').style.display='none';
}

document.addEventListener('DOMContentLoaded',init);
